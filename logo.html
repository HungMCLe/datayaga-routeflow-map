<!DOCTYPE html>
<html>
<body style="margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#f0f0f0;">
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="arc1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="50%" style="stop-color:#ffd93d"/>
      <stop offset="100%" style="stop-color:#6bcb77"/>
    </linearGradient>
    <linearGradient id="arc2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#ff6b9d"/>
    </linearGradient>
    <linearGradient id="arc3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="nodeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd93d"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="300" height="300" rx="50" ry="50" fill="url(#bg)"/>

  <!-- Subtle grid lines for map feel -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="0.5">
    <line x1="60" y1="0" x2="60" y2="300"/>
    <line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="180" y1="0" x2="180" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="0" y1="60" x2="300" y2="60"/>
    <line x1="0" y1="120" x2="300" y2="120"/>
    <line x1="0" y1="180" x2="300" y2="180"/>
    <line x1="0" y1="240" x2="300" y2="240"/>
  </g>

  <!-- Flow arcs -->
  <!-- Arc 1: bottom-left to top-right -->
  <path d="M 65 210 Q 150 60 235 110" fill="none" stroke="url(#arc1)" stroke-width="4" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>

  <!-- Arc 2: left to right-bottom -->
  <path d="M 55 140 Q 160 40 240 180" fill="none" stroke="url(#arc2)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" opacity="0.85"/>

  <!-- Arc 3: bottom-center to top-left -->
  <path d="M 170 230 Q 80 100 100 80" fill="none" stroke="url(#arc3)" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>

  <!-- Animated particles on arcs (static dots to suggest movement) -->
  <circle cx="120" cy="118" r="3" fill="#ffd93d" filter="url(#glow)" opacity="0.9"/>
  <circle cx="190" cy="88" r="2.5" fill="#6bcb77" filter="url(#glow)" opacity="0.8"/>
  <circle cx="130" cy="72" r="2.5" fill="#a78bfa" filter="url(#glow)" opacity="0.9"/>
  <circle cx="200" cy="120" r="2" fill="#ff6b9d" filter="url(#glow)" opacity="0.8"/>
  <circle cx="125" cy="150" r="2" fill="#ec4899" filter="url(#glow)" opacity="0.85"/>

  <!-- Origin/destination nodes -->
  <!-- Node 1 - bottom left -->
  <circle cx="65" cy="210" r="10" fill="#ff6b6b" filter="url(#softglow)" opacity="0.95"/>
  <circle cx="65" cy="210" r="5" fill="#ffffff" opacity="0.9"/>

  <!-- Node 2 - top right -->
  <circle cx="235" cy="110" r="10" fill="#6bcb77" filter="url(#softglow)" opacity="0.95"/>
  <circle cx="235" cy="110" r="5" fill="#ffffff" opacity="0.9"/>

  <!-- Node 3 - left middle -->
  <circle cx="55" cy="140" r="8" fill="#4ecdc4" filter="url(#softglow)" opacity="0.95"/>
  <circle cx="55" cy="140" r="4" fill="#ffffff" opacity="0.9"/>

  <!-- Node 4 - right bottom -->
  <circle cx="240" cy="180" r="9" fill="#ff6b9d" filter="url(#softglow)" opacity="0.95"/>
  <circle cx="240" cy="180" r="4.5" fill="#ffffff" opacity="0.9"/>

  <!-- Node 5 - bottom center -->
  <circle cx="170" cy="230" r="8" fill="#f97316" filter="url(#softglow)" opacity="0.95"/>
  <circle cx="170" cy="230" r="4" fill="#ffffff" opacity="0.9"/>

  <!-- Node 6 - top left -->
  <circle cx="100" cy="80" r="9" fill="#8b5cf6" filter="url(#softglow)" opacity="0.95"/>
  <circle cx="100" cy="80" r="4.5" fill="#ffffff" opacity="0.9"/>

  <!-- "datayaga" text -->
  <text x="150" y="278" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="4" fill="#ffffff" opacity="0.7">DATAYAGA</text>
</svg>
</body>
</html>
